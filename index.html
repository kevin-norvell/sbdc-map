<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>America's SBDC — National Center Locator</title>
<meta name="description" content="Interactive map of every Small Business Development Center (SBDC) in America's SBDC nationwide network.">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<!-- MarkerCluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

<style>
  :root{
    --asbdc-red:#d11242;        /* America's SBDC primary */
    --asbdc-navy:#022d61;       /* America's SBDC navy */
    --asbdc-blue:#5588c6;       /* America's SBDC accent blue */
    --asbdc-gold:#e0922f;       /* outreach / circuit-rider */
    --asbdc-gold-dk:#a8650f;
    --asbdc-red-dark:#a50d34;
    --ink:#1a2230;
    --paper:#f4f6fa;
    --line:#e2e7ef;
    --shadow:0 2px 14px rgba(2,45,97,.10);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:"Open Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--paper)}
  #app{display:flex;flex-direction:column;height:100vh}

  /* ---- Header / brand bar ---- */
  header.brand{
    display:flex;align-items:center;gap:16px;
    padding:10px 18px;background:#fff;border-bottom:4px solid var(--asbdc-red);
    box-shadow:var(--shadow);z-index:1200;flex:none;
  }
  header.brand img{height:46px;width:auto;display:block}
  .brand-titles{line-height:1.15}
  .brand-titles h1{margin:0;font-size:18px;font-weight:700;color:var(--asbdc-navy);letter-spacing:.2px}
  .brand-titles p{margin:2px 0 0;font-size:12px;color:#5a6678;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .brand-spacer{flex:1}
  .brand-stat{text-align:right;line-height:1.1}
  .brand-stat .n{font-size:22px;font-weight:800;color:var(--asbdc-red)}
  .brand-stat .l{font-size:11px;color:#5a6678;text-transform:uppercase;letter-spacing:.5px;font-weight:700}

  /* ---- Layout ---- */
  .main{display:flex;flex:1;min-height:0}
  aside{
    width:330px;flex:none;background:#fff;border-right:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0;z-index:1100;
  }
  .controls{padding:16px 16px 10px}
  .controls label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--asbdc-navy);margin:0 0 5px}
  .controls select,.controls input[type=search]{
    width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--line);border-radius:8px;
    background:#fff;color:var(--ink);outline:none;font-family:inherit;
  }
  .controls select:focus,.controls input:focus{border-color:var(--asbdc-blue);box-shadow:0 0 0 3px rgba(85,136,198,.18)}
  .field{margin-bottom:13px}
  .legend{display:flex;gap:16px;align-items:center;padding:2px 0 4px;font-size:12px;color:#5a6678}
  .legend .dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:5px;vertical-align:-1px;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.15)}
  .dot.center{background:var(--asbdc-red)}
  .dot.lead{background:var(--asbdc-navy)}
  .dot.outreach{background:var(--asbdc-gold)}
  .toggle{display:flex;align-items:center;gap:7px;margin:8px 0 2px;font-size:12.5px;color:#3a4658;cursor:pointer;user-select:none}
  .toggle input{width:15px;height:15px;accent-color:var(--asbdc-red);cursor:pointer}
  .toggle .hint{color:#8893a4;font-size:11px}
  .result-meta{padding:4px 16px 8px;font-size:12px;color:#5a6678;border-bottom:1px solid var(--line)}
  .result-meta b{color:var(--asbdc-navy)}
  .result-meta .ot{color:var(--asbdc-gold-dk)}

  /* ---- List ---- */
  .list{overflow-y:auto;flex:1;min-height:0}
  .item{padding:11px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .item:hover{background:#f0f5fb}
  .item.lead{border-left:4px solid var(--asbdc-navy)}
  .item.service{border-left:4px solid var(--asbdc-red)}
  .item.outreach{border-left:4px solid var(--asbdc-gold)}
  .item .tag.ot{background:var(--asbdc-gold-dk)}
  .item h3{margin:0 0 2px;font-size:14px;font-weight:700;color:var(--asbdc-navy)}
  .item .meta{font-size:12px;color:#5a6678}
  .item .tag{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff;background:var(--asbdc-navy);border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:1px}

  /* ---- Map ---- */
  #map{flex:1;min-height:0;background:#aadaff}

  /* ---- Popups ---- */
  .leaflet-popup-content-wrapper{border-radius:10px;box-shadow:0 6px 24px rgba(2,45,97,.25)}
  .leaflet-popup-content{margin:13px 15px;font-size:13px;line-height:1.5;min-width:220px}
  .pop h3{margin:0 0 2px;font-size:15px;color:var(--asbdc-navy);font-weight:700}
  .pop .sub{font-size:12px;color:#5a6678;margin:0 0 8px}
  .pop .badge{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff;background:var(--asbdc-red);border-radius:4px;padding:1px 6px;margin-bottom:8px}
  .pop .badge.lead{background:var(--asbdc-navy)}
  .pop .badge.ot{background:var(--asbdc-gold-dk)}
  .pop .row{margin:3px 0;display:flex;gap:7px}
  .pop .row .ic{width:15px;flex:none;text-align:center;color:var(--asbdc-blue);font-weight:700}
  .pop a{color:var(--asbdc-blue);text-decoration:none;word-break:break-word}
  .pop a:hover{text-decoration:underline;color:var(--asbdc-red)}
  .pop .approx{font-size:11px;color:#b06b00;background:#fff5e0;border-radius:5px;padding:2px 6px;margin-top:7px;display:inline-block}

  /* cluster recolor to brand */
  .marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{color:#fff;font-weight:800}
  .marker-cluster div{background:var(--asbdc-red)}
  .marker-cluster{background:rgba(209,18,66,.35)}

  .leaflet-bar a{color:var(--asbdc-navy)}

  /* mobile */
  .menu-toggle{display:none}
  @media (max-width:780px){
    .main{flex-direction:column}
    aside{width:100%;max-height:46%;border-right:none;border-bottom:1px solid var(--line)}
    header.brand{flex-wrap:wrap;gap:10px;padding:8px 12px}
    .brand-titles h1{font-size:15px}
    .brand-stat{display:none}
  }
</style>
</head>
<body>
<div id="app">
  <header class="brand">
    <img src="assets/asbdc-logo.png" alt="America's SBDC">
    <div class="brand-titles">
      <h1>National Center Locator</h1>
      <p>America's Small Business Development Center Network<sup>&reg;</sup></p>
    </div>
    <div class="brand-spacer"></div>
  </header>

  <div class="main">
    <aside>
      <div class="controls">
        <div class="field">
          <label for="stateSel">Filter by state network</label>
          <select id="stateSel"><option value="">All states &amp; territories</option></select>
        </div>
        <div class="field">
          <label for="search">Search center or city</label>
          <input type="search" id="search" placeholder="e.g. Lexington, Cal Poly, Tuscaloosa…" autocomplete="off">
        </div>
        <div class="legend">
          <span><span class="dot lead"></span>Lead / state office</span>
          <span><span class="dot center"></span>Service center</span>
          <span><span class="dot outreach"></span>Outreach</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="showOutreach">
          <span>Show outreach / circuit-rider sites</span>
        </label>
      </div>
      <div class="result-meta"><b id="visCount">0</b> service centers shown<span id="otNote"></span></div>
      <div class="list" id="list"></div>
    </aside>
    <div id="map"></div>
  </div>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
const BRAND={red:'#d11242',navy:'#022d61',blue:'#5588c6',gold:'#e0922f'};

// Location type — read baked `type` from data.json, else classify (mirrors scripts/classify.py)
const LEAD_RE=/(State Office|Lead Center|\bNetwork\b|Headquarters|State HQ|State Lead|Regional HQ)/i;
const PARTNER_RE=/(Outreach|Circuit|Satellite|Chamber|Library|Church|Main Street|Economic Develop|\bEDC\b|Partnership|\bAlliance\b|Government Complex|Permit Center|Office Share|Workforce|Community Partnership|Business Resource|Incubator|Collaborative|\bBID\b|Conference Center|Recreation|Development Group)/i;
const COUNTY_RE=/[–-]\s*[A-Za-z. ]+\bCounty\b/i;
const MAIN_RE=/(Main|Regional HQ|\bHQ\b|Lead|State Office|\bNetwork\b)/i;
const TERRITORIES=new Set(['GU','AS','VI','MP','PW','FM','MH']);
function typeOf(c){
  if(c.type) return c.type;
  const n=c.name||'';
  if(c.is_lead||LEAD_RE.test(n)) return 'lead';
  if(TERRITORIES.has(c.state)) return 'service';   // island SBDCs aren't circuit-rider
  if(!(c.street||'').trim()) return 'outreach';
  if(PARTNER_RE.test(n)) return 'outreach';
  if(COUNTY_RE.test(n)&&!MAIN_RE.test(n)) return 'outreach';
  return 'service';
}
const isCenter=c=>typeOf(c)!=='outreach';   // lead + service = "centers"

const map=L.map('map',{zoomControl:true,minZoom:3,maxZoom:18,worldCopyJump:true})
  .setView([39.5,-98.35],4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19,
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors | Data: <a href="https://americassbdc.org/find-your-sbdc/">America&rsquo;s SBDC</a>'
}).addTo(map);

function pin(type){
  const c=type==='lead'?BRAND.navy:type==='outreach'?BRAND.gold:BRAND.red;
  if(type==='outreach'){  // smaller, hollow-style dot for circuit-rider sites
    return L.divIcon({className:'sbdc-pin',
      html:`<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <circle cx="9" cy="9" r="7" fill="${c}" stroke="#fff" stroke-width="2.5"/></svg>`,
      iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-9]});
  }
  return L.divIcon({className:'sbdc-pin',
    html:`<svg width="26" height="34" viewBox="0 0 26 34" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 0C5.8 0 0 5.8 0 13c0 9.2 13 21 13 21s13-11.8 13-21C26 5.8 20.2 0 13 0z" fill="${c}"/>
      <circle cx="13" cy="13" r="5" fill="#fff"/></svg>`,
    iconSize:[26,34],iconAnchor:[13,34],popupAnchor:[0,-30]});
}

const cluster=L.markerClusterGroup({
  maxClusterRadius:48,spiderfyOnMaxZoom:true,showCoverageOnHover:false,
  iconCreateFunction(c){
    const n=c.getChildCount();
    const size=n<10?34:n<50?42:52;
    return L.divIcon({
      html:`<div style="background:${BRAND.red};color:#fff;width:${size}px;height:${size}px;
        line-height:${size}px;border-radius:50%;text-align:center;font-weight:800;font-size:13px;
        border:3px solid #fff;box-shadow:0 2px 8px rgba(2,45,97,.4)">${n}</div>`,
      className:'',iconSize:[size,size]
    });
  }
});

let DATA=[],markers=[];
const esc=s=>(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function tel(p){return (p||'').replace(/[^0-9]/g,'');}
function webLabel(u){return (u||'').replace(/^https?:\/\//,'').replace(/\/$/,'');}

function popupHtml(c){
  const addr=[c.street,[c.city,c.state].filter(Boolean).join(', ')+' '+(c.zip||'')]
    .filter(s=>s&&s.trim()).join('<br>');
  const t=c._t||typeOf(c);
  const badge={lead:['lead','Lead Center'],service:['','SBDC'],outreach:['ot','Outreach']}[t];
  let h=`<div class="pop">`;
  h+=`<span class="badge ${badge[0]}">${badge[1]}</span>`;
  h+=`<h3>${esc(c.name)}</h3>`;
  if(c.subtitle)h+=`<p class="sub">${esc(c.subtitle)}</p>`;
  if(addr)h+=`<div class="row"><span class="ic">📍</span><span>${addr}</span></div>`;
  if(c.phone)h+=`<div class="row"><span class="ic">📞</span><a href="tel:${tel(c.phone)}">${esc(c.phone)}</a></div>`;
  if(c.website)h+=`<div class="row"><span class="ic">🔗</span><a href="${esc(c.website)}" target="_blank" rel="noopener">${esc(webLabel(c.website))}</a></div>`;
  if(c.geocode==='territory'||c.geocode==='census-oneline'&&!c.street)
    h+=`<div class="approx">Approximate location</div>`;
  h+=`</div>`;
  return h;
}

function buildMarkers(){
  markers=DATA.map(c=>{
    c._t=typeOf(c);
    const m=L.marker([c.lat,c.lng],{icon:pin(c._t)});
    m.bindPopup(popupHtml(c),{maxWidth:300});
    m._c=c;
    return m;
  });
}

const stateSel=document.getElementById('stateSel');
const searchBox=document.getElementById('search');
const listEl=document.getElementById('list');
const visCount=document.getElementById('visCount');
const otNote=document.getElementById('otNote');
const showOutreach=document.getElementById('showOutreach');
const resultMeta=document.querySelector('.result-meta');

const TAG={lead:'Lead',outreach:'Outreach'};
function currentFilter(){
  const st=stateSel.value, q=searchBox.value.trim().toLowerCase(), ot=showOutreach.checked;
  return markers.filter(m=>{
    const c=m._c;
    if(!ot && c._t==='outreach') return false;
    if(st && c.state!==st) return false;
    if(q && !(`${c.name} ${c.city} ${c.subtitle}`.toLowerCase().includes(q))) return false;
    return true;
  });
}

function render(){
  const vis=currentFilter();
  cluster.clearLayers();
  cluster.addLayers(vis);
  const nCenter=vis.filter(m=>m._c._t!=='outreach').length;
  const nOut=vis.length-nCenter;
  visCount.textContent=nCenter;
  otNote.innerHTML = nOut ? ` &middot; <span class="ot">${nOut} outreach</span>` : '';
  // keep the default home view number-free; show the count only once filtering/searching
  const active = stateSel.value || searchBox.value.trim() || showOutreach.checked;
  resultMeta.style.display = active ? '' : 'none';
  // list
  listEl.innerHTML='';
  vis.slice().sort((a,b)=>a._c.name.localeCompare(b._c.name)).forEach(m=>{
    const c=m._c, t=c._t;
    const div=document.createElement('div');
    div.className='item '+t;
    const tag=TAG[t]?`<span class="tag ${t==='outreach'?'ot':''}">${TAG[t]}</span>`:'';
    div.innerHTML=`<h3>${esc(c.name)}${tag}</h3>
      <div class="meta">${esc(c.city)}, ${esc(c.state)}${c.phone?' &middot; '+esc(c.phone):''}</div>`;
    div.onclick=()=>{
      map.setView([c.lat,c.lng],13,{animate:true});
      cluster.zoomToShowLayer(m,()=>m.openPopup());
    };
    listEl.appendChild(div);
  });
  // fit
  if(vis.length && (stateSel.value||searchBox.value)){
    const g=L.featureGroup(vis);
    try{map.fitBounds(g.getBounds().pad(0.2),{maxZoom:11});}catch(e){}
  }
}

fetch('data.json',{cache:'no-cache'}).then(r=>r.json()).then(rows=>{
  DATA=rows.filter(c=>typeof c.lat==='number'&&typeof c.lng==='number');
  DATA.forEach(c=>c._t=typeOf(c));
  buildMarkers();
  map.addLayer(cluster);
  // populate states — count shows service centers (lead+service)
  const states=[...new Set(DATA.map(c=>c.state))].sort();
  const names={};DATA.forEach(c=>names[c.state]=c.state_name);
  states.forEach(s=>{
    const n=DATA.filter(c=>c.state===s&&isCenter(c)).length;
    const o=document.createElement('option');o.value=s;o.textContent=`${names[s]||s} (${n})`;
    stateSel.appendChild(o);
  });
  render();
  // self-heal if the map was created before its container had a real size
  setTimeout(()=>map.invalidateSize(),250);
}).catch(e=>{
  document.getElementById('map').innerHTML='<p style="padding:24px;font:16px sans-serif">Could not load data.json — run the build step.</p>';
  console.error(e);
});

stateSel.addEventListener('change',()=>{searchBox.value='';render();if(!stateSel.value)map.setView([39.5,-98.35],4);});
searchBox.addEventListener('input',()=>render());
showOutreach.addEventListener('change',()=>render());
window.addEventListener('resize',()=>map.invalidateSize());
</script>
</body>
</html>
